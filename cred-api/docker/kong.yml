_format_version: "1.1"

###############################################################################
# Kong declarative config
# Routes all /functions/v1/* traffic to the Deno relay container.
# Routes /auth/v1/* to GoTrue.
# Routes /rest/v1/* to PostgREST.
# Routes /storage/v1/* to the Storage API.
###############################################################################

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7stqwwVPgpoe1jlvlbe3694LeSrdFo4}

  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:

  # ---------------------------------------------------------------------------
  # Auth — GoTrue
  # ---------------------------------------------------------------------------
  - name: auth-v1
    url: http://gotrue:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - x-client-info
            - apikey
          max_age: 3600

  # ---------------------------------------------------------------------------
  # REST — PostgREST
  # ---------------------------------------------------------------------------
  - name: rest-v1
    url: http://postgrest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - x-client-info
            - apikey
            - Prefer
          max_age: 3600

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - x-client-info
            - apikey
          max_age: 3600

  # ---------------------------------------------------------------------------
  # Edge Functions — Deno relay
  # ---------------------------------------------------------------------------
  - name: functions-v1
    url: http://deno-relay:8081/functions/v1/
    routes:
      - name: functions-v1-route
        strip_path: false
        paths:
          - /functions/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - x-client-info
            - apikey
          max_age: 3600

  # ---------------------------------------------------------------------------
  # Realtime
  # ---------------------------------------------------------------------------
  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-route
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - x-client-info
            - apikey
          max_age: 3600
