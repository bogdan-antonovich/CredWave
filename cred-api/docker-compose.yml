version: "3.9"

# =============================================================================
# CredWave — Local Development Stack
#
# Services:
#   postgres    — Supabase-compatible Postgres 15 with all extensions
#   kong        — API gateway (routes /functions/v1/* to deno-relay)
#   gotrue      — Supabase Auth (Google OAuth)
#   postgrest   — Auto-generated REST API over Postgres (used by Supabase SDK)
#   realtime    — Supabase Realtime (websockets)
#   storage     — Supabase Storage API
#   imgproxy    — Image transformation for storage
#   inbucket    — Local email catcher (contact form emails go here)
#   deno-relay  — Runs all Edge Functions locally via Deno
#   pg-meta     — Postgres metadata API (used by Studio)
#   studio      — Supabase Studio UI (http://localhost:54323)
# =============================================================================

networks:
  credwave:
    driver: bridge

volumes:
  postgres-data:
  storage-data:

services:

  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: supabase/postgres:15.1.1.41
    restart: unless-stopped
    ports:
      - "54322:5432"
    networks:
      - credwave
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Run migrations on first start
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # GoTrue — Auth
  # ---------------------------------------------------------------------------
  gotrue:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:54321}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:5173/**,http://localhost:5174/**}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      # Google OAuth
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL:-http://localhost:54321}/auth/v1/callback
      GOTRUE_EXTERNAL_GOOGLE_ADDITIONAL_SCOPES: "https://www.googleapis.com/auth/business.manage"
      # Email (local Inbucket)
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_ADMIN_EMAIL: admin@credwave.app
      GOTRUE_SMTP_MAX_FREQUENCY: 1s
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: "Confirm your CredWave account"
      GOTRUE_MAILER_SUBJECTS_RECOVERY: "Reset your CredWave password"

  # ---------------------------------------------------------------------------
  # PostgREST — Auto REST API (used by Supabase JS SDK)
  # ---------------------------------------------------------------------------
  postgrest:
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  # ---------------------------------------------------------------------------
  # Realtime
  # ---------------------------------------------------------------------------
  realtime:
    image: supabase/realtime:v2.28.32
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3bhZa39neqgG977PS06S
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v0.46.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    environment:
      ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7stqwwVPgpoe1jlvlbe3694LeSrdFo4}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage

  # ---------------------------------------------------------------------------
  # Imgproxy (used by Storage for image transformations)
  # ---------------------------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    networks:
      - credwave
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"

  # ---------------------------------------------------------------------------
  # Kong — API Gateway
  # Routes all traffic to the right internal service
  # ---------------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      - gotrue
      - postgrest
      - storage
      - deno-relay
    networks:
      - credwave
    ports:
      - "54321:8000"   # Main API port — this is your SUPABASE_URL host
      - "54320:8443"   # HTTPS (unused locally)
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
    volumes:
      - ./docker/kong.yml:/etc/kong/kong.yml:ro

  # ---------------------------------------------------------------------------
  # Postgres Meta — used by Supabase Studio
  # ---------------------------------------------------------------------------
  pg-meta:
    image: supabase/postgres-meta:v0.80.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  # ---------------------------------------------------------------------------
  # Supabase Studio
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:20240205-b1b6c94
    restart: unless-stopped
    depends_on:
      - kong
      - pg-meta
    networks:
      - credwave
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://pg-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: CredWave
      DEFAULT_PROJECT_NAME: credwave-local
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7stqwwVPgpoe1jlvlbe3694LeSrdFo4}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl}

  # ---------------------------------------------------------------------------
  # Inbucket — local email catcher
  # Open http://localhost:54324 to read caught emails
  # ---------------------------------------------------------------------------
  inbucket:
    image: inbucket/inbucket:latest
    restart: unless-stopped
    networks:
      - credwave
    ports:
      - "54324:9000"   # Web UI
      - "2500:2500"    # SMTP
      - "1100:1100"    # POP3

  # ---------------------------------------------------------------------------
  # Deno Relay — serves all Edge Functions locally
  # ---------------------------------------------------------------------------
  deno-relay:
    build:
      context: .
      dockerfile: docker/Dockerfile.deno
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credwave
    ports:
      - "8081:8081"    # Direct access for debugging
    environment:
      # Supabase (points to internal Docker network services)
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7stqwwVPgpoe1jlvlbe3694LeSrdFo4}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      # External API keys (set in your .env file)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PADDLE_API_KEY: ${PADDLE_API_KEY:-}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-hello@credwave.com}
    volumes:
      - ./supabase/functions:/app/functions:ro
