name: Web CI

on:
  push:
    branches: [master]
    paths:
      - "cred-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "cred-web/**"
      - ".github/workflows/web-ci.yml"

defaults:
  run:
    working-directory: cred-web

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cred-web/package-lock.json

      - run: npm ci

      - name: vue-tsc
        run: npx vue-tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cred-web/package-lock.json

      - run: npm ci

      - name: Vite build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_PADDLE_VENDOR_ID: ${{ vars.VITE_PADDLE_VENDOR_ID }}
          VITE_PADDLE_ENV: ${{ vars.VITE_PADDLE_ENV }}
          VITE_PADDLE_PRICE_STARTER_MONTHLY: ${{ vars.VITE_PADDLE_PRICE_STARTER_MONTHLY }}
          VITE_PADDLE_PRICE_STARTER_ANNUAL: ${{ vars.VITE_PADDLE_PRICE_STARTER_ANNUAL }}
          VITE_PADDLE_PRICE_GROWTH_MONTHLY: ${{ vars.VITE_PADDLE_PRICE_GROWTH_MONTHLY }}
          VITE_PADDLE_PRICE_GROWTH_ANNUAL: ${{ vars.VITE_PADDLE_PRICE_GROWTH_ANNUAL }}
          VITE_PADDLE_PRICE_SCALE_MONTHLY: ${{ vars.VITE_PADDLE_PRICE_SCALE_MONTHLY }}
          VITE_PADDLE_PRICE_SCALE_ANNUAL: ${{ vars.VITE_PADDLE_PRICE_SCALE_ANNUAL }}
