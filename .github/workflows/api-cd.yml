name: API CD

on:
  workflow_run:
    workflows: ["API CI"]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set deploy tag
        run: echo "TAG=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-8)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cred-api
          file: cred-api/docker/prod.Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/credwave:${{ env.TAG }}
          cache-from: type=gha,scope=cred-prod
          cache-to: type=gha,mode=max,scope=cred-prod

      - name: Copy compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "cred-api/docker/docker-compose.yml,cred-api/cfg/loki-config.yml,cred-api/cfg/grafana-datasource.yml"
          target: "~/cred-api/"
          strip_components: 1

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: >-
            TAG,
            DOCKERHUB_USERNAME,
            DOCKERHUB_TOKEN,
            PORT,
            NODE_ENV,
            LOG_LEVEL,
            DATABASE_URL,
            JWT_SECRET,
            JWT_EXPIRES_IN,
            GOOGLE_CLIENT_ID,
            GOOGLE_CLIENT_SECRET,
            GOOGLE_CALLBACK_URL,
            FRONTEND_URL,
            GOOGLE_PLACES_API_KEY,
            TG_BOT_TOKEN,
            TG_CHAT_ID,
            PADDLE_API_KEY,
            PADDLE_WEBHOOK_SECRET,
            SERPAPI_API_KEY,
            OPENAI_API_KEY,
            OPENAI_MODEL,
            ADMIN_ID,
            ADMIN_PASSWORD,
            POSTGRES_PASSWORD,
            GRAFANA_PASSWORD,
          script: |
            set -euo pipefail

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            sync_secret() {
              local name="${1}_${TAG}"
              local value="$2"
              if [ -z "$value" ]; then
                echo "ERROR: $1 is empty"
                exit 1
              fi
              if ! docker secret inspect "$name" >/dev/null 2>&1; then
                echo "Creating secret: $name"
                printf '%s' "$value" | docker secret create "$name" -
              fi
            }

            sync_config() {
              local name="${1}_${TAG}"
              local file="$2"
              if ! docker config inspect "$name" >/dev/null 2>&1; then
                echo "Creating config: $name"
                docker config create "$name" "$file"
              fi
            }

            sync_secret "DATABASE_URL_FILE"           "$DATABASE_URL"
            sync_secret "JWT_SECRET_FILE"             "$JWT_SECRET"
            sync_secret "GOOGLE_CLIENT_ID_FILE"       "$GOOGLE_CLIENT_ID"
            sync_secret "GOOGLE_CLIENT_SECRET_FILE"   "$GOOGLE_CLIENT_SECRET"
            sync_secret "GOOGLE_PLACES_API_KEY_FILE"  "$GOOGLE_PLACES_API_KEY"
            sync_secret "TG_BOT_TOKEN_FILE"           "$TG_BOT_TOKEN"
            sync_secret "PADDLE_API_KEY_FILE"         "$PADDLE_API_KEY"
            sync_secret "PADDLE_WEBHOOK_SECRET_FILE"  "$PADDLE_WEBHOOK_SECRET"
            sync_secret "SERPAPI_API_KEY_FILE"        "$SERPAPI_API_KEY"
            sync_secret "OPENAI_API_KEY_FILE"         "$OPENAI_API_KEY"
            sync_secret "ADMIN_PASSWORD_FILE"         "$ADMIN_PASSWORD"
            sync_secret "POSTGRES_PASSWORD_FILE"      "$POSTGRES_PASSWORD"

            sync_config "loki_config"        ~/cred-api/cfg/loki-config.yml
            sync_config "grafana_datasource" ~/cred-api/cfg/grafana-datasource.yml

            cd ~/cred-api

            export TAG="$TAG"
            export DOCKER_REGISTRY="$DOCKERHUB_USERNAME"
            export PORT NODE_ENV LOG_LEVEL
            export JWT_EXPIRES_IN
            export GOOGLE_CALLBACK_URL
            export FRONTEND_URL
            export TG_CHAT_ID
            export OPENAI_MODEL
            export ADMIN_ID
            export GRAFANA_PASSWORD

            envsubst < docker/docker-compose.yml > docker/docker-compose.resolved.yml

            docker stack deploy \
              --with-registry-auth \
              --prune \
              -c docker/docker-compose.resolved.yml \
              cred-api_stack

            echo "Waiting for services to stabilize..."

            MAX_WAIT=30
            WAIT_COUNT=0

            until [ $WAIT_COUNT -ge $MAX_WAIT ]; do
              ALL_HEALTHY=true

              for SERVICE in cred-api_stack_api cred-api_stack_db cred-api_stack_loki cred-api_stack_grafana; do
                REPLICAS=$(docker service ls \
                  --filter name=$SERVICE \
                  --format '{{.Replicas}}')

                DESIRED=$(echo $REPLICAS | cut -d'/' -f2)
                RUNNING=$(echo $REPLICAS | cut -d'/' -f1)

                FAILED=$(docker service ps $SERVICE \
                  --filter "desired-state=running" \
                  --no-trunc \
                  --format '{{.CurrentState}}' \
                  | grep -c "Failed" || true)

                if [ -z "$REPLICAS" ] || [ "$RUNNING" != "$DESIRED" ] || [ "$FAILED" -gt 0 ]; then
                  echo "[$WAIT_COUNT/$MAX_WAIT] $SERVICE not ready: $REPLICAS failed=$FAILED"
                  ALL_HEALTHY=false
                fi
              done

              MIGRATE_STATE=$(docker service ps cred-api_stack_migrate \
                --format '{{.CurrentState}}' \
                | head -1)

              if [[ "$MIGRATE_STATE" != Complete* ]]; then
                echo "[$WAIT_COUNT/$MAX_WAIT] migrate not complete: $MIGRATE_STATE"
                ALL_HEALTHY=false
              fi

              if [ "$ALL_HEALTHY" = true ]; then
                echo "All services healthy."
                break
              fi

              sleep 10
              WAIT_COUNT=$((WAIT_COUNT + 1))
            done

            if [ $WAIT_COUNT -ge $MAX_WAIT ]; then
              echo "ERROR: Deployment timed out"
              docker service ls
              exit 1
            fi

            echo "Cleaning up old secrets..."
            docker secret ls --format '{{.Name}}' \
              | grep -E '^(DATABASE_URL_FILE|JWT_SECRET_FILE|GOOGLE_CLIENT_ID_FILE|GOOGLE_CLIENT_SECRET_FILE|GOOGLE_PLACES_API_KEY_FILE|TG_BOT_TOKEN_FILE|PADDLE_API_KEY_FILE|PADDLE_WEBHOOK_SECRET_FILE|SERPAPI_API_KEY_FILE|OPENAI_API_KEY_FILE|ADMIN_PASSWORD_FILE|POSTGRES_PASSWORD_FILE)_[a-f0-9]{8}$' \
              | grep -v "_${TAG}$" \
              | xargs -r docker secret rm \
              || true

            echo "Cleaning up old configs..."
            docker config ls --format '{{.Name}}' \
              | grep -E '^(loki_config|grafana_datasource)_[a-f0-9]{8}$' \
              | grep -v "_${TAG}$" \
              | xargs -r docker config rm \
              || true

            echo "Cleaning up old images..."
            docker image prune -f
        env:
          TAG: ${{ env.TAG }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PORT: ${{ vars.PORT }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ vars.JWT_EXPIRES_IN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ vars.TG_CHAT_ID }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ADMIN_ID: ${{ vars.ADMIN_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
