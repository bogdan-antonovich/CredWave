version: "3.8"

services:
  web:
    image: ${DOCKER_REGISTRY}/credwave-web:${TAG}
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_APP_URL: ${VITE_APP_URL}
      VITE_DASHBOARD_URL: ${VITE_DASHBOARD_URL}
      VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY}
      VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST}
      VITE_PADDLE_VENDOR_ID: ${VITE_PADDLE_VENDOR_ID}
      VITE_PADDLE_ENV: ${VITE_PADDLE_ENV}
      VITE_PADDLE_PRICE_STARTER_MONTHLY: ${VITE_PADDLE_PRICE_STARTER_MONTHLY}
      VITE_PADDLE_PRICE_STARTER_ANNUAL: ${VITE_PADDLE_PRICE_STARTER_ANNUAL}
      VITE_PADDLE_PRICE_GROWTH_MONTHLY: ${VITE_PADDLE_PRICE_GROWTH_MONTHLY}
      VITE_PADDLE_PRICE_GROWTH_ANNUAL: ${VITE_PADDLE_PRICE_GROWTH_ANNUAL}
      VITE_PADDLE_PRICE_SCALE_MONTHLY: ${VITE_PADDLE_PRICE_SCALE_MONTHLY}
      VITE_PADDLE_PRICE_SCALE_ANNUAL: ${VITE_PADDLE_PRICE_SCALE_ANNUAL}
    networks:
      - credwave_web
    ports:
      - target: 80
        published: 67
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first

#t
networks:
  credwave_web:
    driver: overlay
